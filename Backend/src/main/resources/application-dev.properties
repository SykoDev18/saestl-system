# ===== Profile: dev (H2 in-memory, PostgreSQL compat mode) =====
# Activo por defecto — NO necesita Docker

spring.datasource.url=jdbc:h2:mem:saestl_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA validates after Flyway migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway: use PostgreSQL migrations — H2 PostgreSQL mode handles BIGSERIAL, etc.
spring.flyway.locations=classpath:db/migration
