# ===== Profile: docker (PostgreSQL real) =====
# Se activa con: SPRING_PROFILES_ACTIVE=docker

spring.datasource.url=jdbc:postgresql://localhost:5432/saestl_db
spring.datasource.username=saestl
spring.datasource.password=saestl_secret

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.locations=classpath:db/migration
