# ===== Profile: docker (PostgreSQL real) =====
# Se activa con: SPRING_PROFILES_ACTIVE=docker

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:saestl_db}?sslmode=${POSTGRES_SSLMODE:disable}
spring.datasource.username=${POSTGRES_USER:saestl}
spring.datasource.password=${POSTGRES_PASSWORD:saestl_secret}

spring.jpa.hibernate.ddl-auto=validate

# CORS — en produccion usar la URL de Vercel
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
